<nav class="breadcrumbs" aria-label="Breadcrumb">
    <ol>
        <li><a href="{{ .Site.BaseURL }}">Home</a></li>
        {{ range .Site.Menus.breadcrumb }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
        {{ if not .IsHome }}
        <li class="current">{{ .Title }}</li>
        {{ end }}
    </ol>
</nav>

<style>
.breadcrumbs ol {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    align-items: center;
    flex-wrap: wrap;
}

.breadcrumbs li {
    font-size: 0.9rem;
}

.breadcrumbs li:not(:last-child)::after {
    content: '/';
    margin: 0 8px;
    color: #999;
}

.breadcrumbs a {
    color: #0066cc;
    text-decoration: none;
}

.breadcrumbs a:hover {
    text-decoration: underline;
}

.breadcrumbs .current {
    color: #666;
}
</style>
