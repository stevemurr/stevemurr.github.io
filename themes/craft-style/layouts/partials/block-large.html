<a href="{{ .RelPermalink }}" class="block block-large" data-url="{{ .RelPermalink }}">
    {{ with .Params.thumbnail }}
    <div class="block-image">
        <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
    </div>
    {{ end }}
    <div class="block-content">
        <h3 class="block-title">{{ .Title }}</h3>
        {{ with .Summary }}
        <p class="block-excerpt">{{ . | truncate 120 }}</p>
        {{ end }}
        {{ with .Params.tags }}
        <div class="block-tags">
            {{ range . }}
            <span class="tag">{{ . }}</span>
            {{ end }}
        </div>
        {{ end }}
    </div>
</a>
