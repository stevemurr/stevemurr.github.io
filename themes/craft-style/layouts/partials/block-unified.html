<a href="{{ .RelPermalink }}" class="block block-unified {{ if .Params.featured }}block-featured{{ end }}" data-url="{{ .RelPermalink }}">
    <div class="unified-content-wrapper">
        {{ with .Params.thumbnail }}
        <div class="unified-image">
            <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
        </div>
        {{ end }}
        <div class="unified-content">
            {{ if .Params.featured }}
            <span class="featured-badge">Featured</span>
            {{ end }}
            <h2 class="unified-title">{{ .Title }}</h2>
            {{ with .Summary }}
            <p class="unified-excerpt">{{ . | truncate 200 }}</p>
            {{ end }}
            <div class="unified-meta">
                {{ with .Params.tags }}
                <div class="unified-tags">
                    {{ range . }}
                    <span class="tag">{{ . }}</span>
                    {{ end }}
                </div>
                {{ end }}
                <time class="unified-date" datetime="{{ .Date.Format "2006-01-02" }}">
                    {{ .Date.Format "January 2, 2006" }}
                </time>
            </div>
        </div>
    </div>
</a>
