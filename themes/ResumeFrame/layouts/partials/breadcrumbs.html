{{- if not .IsHome }}
<nav class="breadcrumbs" aria-label="Breadcrumbs">
  <a href="/">Home</a>
  {{- range .Ancestors.Reverse }}
  {{- if not .IsHome }}
  <span aria-hidden="true">/</span>
  <a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a>
  {{- end }}
  {{- end }}
  {{- if .Title }}
  <span aria-hidden="true">/</span>
  <span>{{ .Title }}</span>
  {{- end }}
</nav>
{{- end }}
