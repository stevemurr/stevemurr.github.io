# Refresh homepage GitHub activity data for Cloudflare Pages builds
name: Refresh GitHub activity data

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "dev-activity"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate GitHub activity data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_dev_activity.py
      - name: Commit updated activity data
        run: |
          if git diff --quiet -- data/dev_activity.json; then
            echo "No dev activity changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dev_activity.json
          git commit -m "Refresh GitHub activity data"
          git push
