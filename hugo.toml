baseURL = 'https://stevemurr.github.io/'
languageCode = 'en-us'
title = 'Steve Murr'
theme = 'PaperMod'
[pagination]
  pagerSize = 5

[params]
  defaultTheme = "light"
  disableThemeToggle = true
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = false
  showCodeCopyButtons = true
  disableSpecial1stPost = true
  hideDescription = false

  [params.assets]
    theme_color = "#f6efe6"
    msapplication_TileColor = "#f6efe6"

  [params.profileMode]
    enabled = true
    title = "Steve Murr"
    subtitle = "Software engineer in San Jose building AI-native products, local-first search systems, and developer tooling."

    [[params.profileMode.buttons]]
      name = "Selected Work"
      url = "/#selected-work"

    [[params.profileMode.buttons]]
      name = "Resume"
      url = "/resume/"

    [[params.profileMode.buttons]]
      name = "GitHub"
      url = "https://github.com/stevemurr"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/stevemurr"

[menu]
  [[menu.main]]
    identifier = "resume"
    name = "Resume"
    url = "/resume/"
    weight = 10
  [[menu.main]]
    identifier = "posts"
    name = "Writing"
    url = "/posts/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
