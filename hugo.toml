baseURL = 'https://stevemurr.github.io/'
languageCode = 'en-us'
title = 'Steve Murr'
theme = 'ResumeFrame'

[taxonomies]
  tag = 'tags'
  series = 'series'

[pagination]
  pagerSize = 5

[params]
  showReadingTime = true

  # Worker code and deployment live in ~/Code/github.com/stevemurr/hugo-cf-worker-metrics
  [params.cfWorkerMetrics]
    workerURL = "https://stevemurr-site-metrics.gh-murr-proxy.workers.dev"

  [params.assets]
    theme_color = "#f6efe6"
    msapplication_TileColor = "#f6efe6"

  [params.profileMode]
    title = "Steve Murr"
    subtitle = "Software engineer in San Jose building AI-native products, local-first search systems, and developer tooling."

[menu]
  [[menu.main]]
    identifier = "resume"
    name = "Resume"
    url = "/"
    weight = 10
  [[menu.main]]
    identifier = "articles"
    name = "Articles"
    url = "/articles/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
