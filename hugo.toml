baseURL = 'https://stevemurr.github.io/'
languageCode = 'en-us'
title = 'Steve Murr'
theme = 'PaperMod'
[pagination]
  pagerSize = 5

[params]
  defaultTheme = "auto"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = false
  showCodeCopyButtons = true
  disableSpecial1stPost = true
  hideDescription = false

  [params.profileMode]
    enabled = true
    title = "Steve Murr"
    subtitle = "Software engineer in San Jose. I build AI tools, browsers, search engines, and the occasional game."

    [[params.profileMode.buttons]]
      name = "Writing"
      url = "/posts/"

    [[params.profileMode.buttons]]
      name = "GitHub"
      url = "https://github.com/stevemurr"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/stevemurr"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Writing"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 20

[outputs]
  home = ["HTML", "RSS", "JSON"]
