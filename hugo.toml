baseURL = 'https://stevemurr.github.io/'
languageCode = 'en-us'
title = 'Steve Murr'
theme = 'PaperMod'

[params]
  defaultTheme = "auto"
  showReadingTime = true
  showShareButtons = false
  showPostNavLinks = true
  showBreadCrumbs = true
  showCodeCopyButtons = true

  [params.homeInfoParams]
    Title = "Hi, I'm Steve"
    Content = "I build things with code. Mostly AI, browsers, audio tools, and whatever else seems interesting."

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/stevemurr"

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "archives"
    name = "Archives"
    url = "/archives/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]
