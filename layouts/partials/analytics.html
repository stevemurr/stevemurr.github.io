<script>
  (function() {
    var hostname = window.location.hostname;
    var isLocalHost =
      hostname === "localhost"
      || hostname === "127.0.0.1"
      || hostname === "[::1]";

    if (isLocalHost) {
      return;
    }

    fetch("/api/analytics/track?page=" + encodeURIComponent(window.location.pathname), {
      method: "GET",
      credentials: "omit",
      keepalive: true
    }).catch(function() {});
  })();
</script>
