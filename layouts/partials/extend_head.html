<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&display=swap" rel="stylesheet">
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit" async defer></script>
{{- if eq .Layout "admin" -}}
<meta name="robots" content="noindex, nofollow">
{{- $adminStyles := resources.Get "css/extended/admin.css" | minify | fingerprint -}}
{{- $adminScript := resources.Get "js/admin.js" | minify | fingerprint -}}
<link rel="stylesheet" href="{{ $adminStyles.RelPermalink }}" integrity="{{ $adminStyles.Data.Integrity }}">
<script defer src="{{ $adminScript.RelPermalink }}" integrity="{{ $adminScript.Data.Integrity }}"></script>
{{- else -}}
{{ partial "analytics.html" . }}
{{- end -}}
