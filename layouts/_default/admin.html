{{- define "main" }}
<section class="admin-page" data-admin-app data-admin-api-root="/api/admin">
  <div
    class="admin-feedback admin-feedback--info"
    data-admin-feedback
    role="status"
    aria-live="polite"
    aria-atomic="true"
    aria-hidden="true"
    hidden
  ></div>

  <div class="admin-workspace">
    <main class="admin-main">
      <section class="admin-panel admin-panel--library" data-admin-post-library>
        <div class="admin-post-table-wrap">
          <table class="admin-post-table">
            <thead>
              <tr>
                <th scope="col">Title</th>
                <th scope="col">Repo</th>
                <th scope="col">Date</th>
                <th scope="col">Publish Status</th>
              </tr>
            </thead>
            <tbody data-admin-post-list></tbody>
          </table>
        </div>
      </section>

      <section class="admin-panel admin-panel--detail" data-admin-post-detail hidden>
        <form class="admin-form" data-admin-post-form>
          <header class="admin-detail__header">
            <button
              class="admin-icon-button admin-icon-button--back"
              type="button"
              data-admin-action="back-to-library"
              aria-label="Back to library"
              title="Back to library"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M15 18l-6-6 6-6" />
              </svg>
            </button>

            <div class="admin-detail__toolbar">
              <div class="admin-publish-toggle" role="group" aria-label="Publish status">
                <button class="admin-publish-toggle__option" type="button" data-admin-action="set-post-draft" data-draft="true">
                  Draft
                </button>
                <button class="admin-publish-toggle__option" type="button" data-admin-action="set-post-draft" data-draft="false">
                  Published
                </button>
              </div>

              <button
                class="admin-icon-button admin-icon-button--primary"
                type="button"
                data-admin-action="save-post"
                aria-label="Save post"
                title="Save post"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                  <path d="M19 21H5a2 2 0 0 1-2-2V7.5L7.5 3h9L21 7.5V19a2 2 0 0 1-2 2Z" />
                  <path d="M17 21v-8H7v8" />
                  <path d="M7 3v5h8" />
                </svg>
              </button>
            </div>
          </header>

          <section class="admin-post-settings">
            <div class="admin-form-grid admin-form-grid--two">
              <label class="admin-field admin-field--wide">
                <span>Title</span>
                <input id="admin-post-title" name="title" type="text" autocomplete="off">
              </label>

              <label class="admin-field">
                <span>Date</span>
                <input id="admin-post-date" name="date" type="date">
              </label>

              <label class="admin-field">
                <span>Repo</span>
                <select id="admin-post-projects" name="projects">
                  <option value="">No repository</option>
                </select>
              </label>
            </div>
          </section>

          <section class="admin-editor">
            <div class="admin-editor__toolbar-row">
              <div class="admin-editor__toolbar" data-admin-editor-toolbar>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="undo" title="Undo" aria-label="Undo">↺</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="redo" title="Redo" aria-label="Redo">↻</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="bold" title="Bold" aria-label="Bold"><strong>B</strong></button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="italic" title="Italic" aria-label="Italic"><em>I</em></button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="heading-2" title="Heading 2" aria-label="Heading 2">H2</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="heading-3" title="Heading 3" aria-label="Heading 3">H3</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="bullet-list" title="Bullet list" aria-label="Bullet list">•</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="ordered-list" title="Ordered list" aria-label="Ordered list">1.</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="blockquote" title="Blockquote" aria-label="Blockquote">“</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="code-block" title="Code block" aria-label="Code block">&lt;/&gt;</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="rule" title="Horizontal rule" aria-label="Horizontal rule">—</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="link" title="Link" aria-label="Link">🔗</button>
                <button class="admin-editor__tool" type="button" data-admin-action="editor-command" data-command="table" title="Insert table" aria-label="Insert table">▦</button>
              </div>

              <div class="admin-editor__mode-toggle" role="group" aria-label="Editor mode">
                <button class="admin-editor__mode-button" type="button" data-admin-action="set-editor-mode" data-mode="visual">
                  Visual
                </button>
                <button class="admin-editor__mode-button" type="button" data-admin-action="set-editor-mode" data-mode="source">
                  Markdown
                </button>
              </div>
            </div>

            <div class="admin-editor__surface" data-admin-editor-visual></div>

            <label class="admin-field admin-field--wide admin-editor__source" data-admin-editor-source-wrap hidden>
              <span>Markdown source</span>
              <textarea id="admin-post-body-source" name="bodySource" class="admin-code-area" rows="24" spellcheck="false" data-admin-editor-source></textarea>
            </label>
          </section>
        </form>
      </section>
    </main>
  </div>

  <div class="admin-modal admin-modal--resume" data-admin-resume-modal hidden>
    <button class="admin-modal__backdrop" type="button" aria-label="Close resume editor" data-admin-action="close-resume"></button>
    <section class="admin-modal__dialog admin-modal__dialog--wide" role="dialog" aria-modal="true" aria-labelledby="admin-resume-modal-title">
      <header class="admin-modal__header">
        <div>
          <h2 id="admin-resume-modal-title">Pinned projects</h2>
        </div>
        <div class="admin-panel__actions">
          <button class="admin-button admin-button--ghost" type="button" data-admin-action="close-resume">Close</button>
        </div>
      </header>

      <form class="admin-form admin-modal__body admin-form--resume-projects" data-admin-resume-form>
        <div class="admin-panel__actions admin-panel__actions--end">
          <button class="admin-button admin-button--ghost" type="button" data-admin-action="add-project">Add Project</button>
        </div>

        <div class="admin-repeat-list" id="admin-resume-projects" data-admin-resume-projects></div>
        <p class="admin-repeat-empty" data-admin-project-empty>No pinned projects yet.</p>
      </form>

      <footer class="admin-modal__footer">
        <span class="admin-badge admin-badge--quiet">content/resume.md</span>
        <div class="admin-panel__actions">
          <button class="admin-button" type="button" data-admin-action="save-resume">Save pinned projects</button>
        </div>
      </footer>
      </section>
    </div>
  </div>

  <template id="admin-project-template">
    <div class="admin-repeat-row" data-admin-row="resume-project">
      <div class="admin-repeat-grid admin-repeat-grid--two">
        <label class="admin-field">
          <span>Name</span>
          <input type="text" data-field="name" autocomplete="off">
        </label>

        <label class="admin-field">
          <span>Repo</span>
          <input type="text" data-field="repo" autocomplete="off" placeholder="stevemurr/fabric">
        </label>

        <label class="admin-field admin-field--wide">
          <span>Summary</span>
          <textarea rows="3" data-field="summary"></textarea>
        </label>
      </div>

      <button class="admin-link-button" type="button" data-admin-action="remove-row">Remove</button>
    </div>
  </template>
</section>
{{- end }}
