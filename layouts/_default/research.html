{{- define "main" }}

{{- $pages := where site.RegularPages "Section" "posts" }}
{{- $pages = $pages.ByDate.Reverse }}

<section class="articles-archive">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>

  {{ partial "article_index.html" (dict
    "pages" $pages
    "ariaLabel" "Research by date"
    "linkMode" "research"
  ) }}
</section>

{{- end }}
